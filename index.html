<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trenzas Urbanas - Tienda Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3e8ff;
}

/* HEADER */
header{
  background:#6a0dad;
  color:white;
  display:flex;
  justify-content:space-between;
  padding:15px;
  align-items:center;
}

.menu-btn{
  font-size:26px;
  cursor:pointer;
}

/* HOME */
.home{
  text-align:center;
  background:linear-gradient(#6a0dad,#b57edc);
  color:white;
  padding:40px;
}

/* GRID */
.grid{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  padding:10px;
}

/* CARD PRO */
.card{
  background:white;
  border-radius:15px;
  width:180px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

.price{
  font-weight:bold;
}

/* BOTONES */
button{
  background:#6a0dad;
  color:white;
  border:none;
  padding:8px;
  border-radius:5px;
  cursor:pointer;
  margin:2px;
}

/* CART */
.cart-btn{
  position:fixed;
  top:15px;
  right:15px;
  background:white;
  color:#6a0dad;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* CART PANEL */
.cart{
  position:fixed;
  top:0;
  right:0;
  width:320px;
  height:100%;
  background:white;
  padding:15px;
  display:none;
  overflow:auto;
  box-shadow:-5px 0 20px rgba(0,0,0,0.2);
}

.item{
  border-bottom:1px solid #eee;
  padding:10px 0;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  font-size:40px;
}
</style>

</head>

<body>

<header>
  <div>💜 Trenzas Urbanas PRO</div>
</header>

<div class="cart-btn" onclick="openCart()">
🛒 Carrito (<span id="count">0</span>)
</div>

<!-- HOME -->
<section class="home">
  <h1>Trenzas Urbanas</h1>
  <p>Estilos únicos y personalizados</p>
</section>

<!-- CATALOGO -->
<section class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
    <div class="card-content">
      <h3>2 Trenzas Boxeadoras</h3>
      <p class="price">$10.000</p>

      <button onclick="add('2 Trenzas Boxeadoras',10000)">Agregar</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1526045478516-99145907023c">
    <div class="card-content">
      <h3>4 Trenzas</h3>
      <p class="price">$15.000</p>

      <button onclick="add('4 Trenzas',15000)">Agregar</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
    <div class="card-content">
      <h3>Coleta Alta</h3>
      <p class="price">$12.000</p>

      <button onclick="add('Coleta Alta',12000)">Agregar</button>
    </div>
  </div>

</section>

<!-- CART -->
<div id="cart" class="cart">
  <h2>Tu carrito</h2>

  <div id="items"></div>

  <h3>Total: $<span id="total">0</span></h3>

  <button onclick="send()">Enviar WhatsApp</button>
  <button onclick="closeCart()">Cerrar</button>
</div>

<!-- WHATSAPP -->
<a class="whatsapp"
href="https://wa.me/5493705141113?text=Hola%20quiero%20información%20sobre%20trenzas"
target="_blank">🟢</a>

<script>

let cart = [];

function add(name, price){

  let item = cart.find(i => i.name === name);

  if(item){
    item.qty++;
  }else{
    cart.push({name, price, qty:1});
  }

  update();
}

function update(){

  document.getElementById("count").innerText =
    cart.reduce((a,b)=>a+b.qty,0);

  let items = document.getElementById("items");
  items.innerHTML = "";

  let total = 0;

  cart.forEach((i,index)=>{

    total += i.price * i.qty;

    items.innerHTML += `
      <div class="item">
        <b>${i.name}</b><br>
        $${i.price} x ${i.qty}<br>

        <button onclick="changeQty(${index},-1)">-</button>
        <button onclick="changeQty(${index},1)">+</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function changeQty(index, val){
  cart[index].qty += val;

  if(cart[index].qty <= 0){
    cart.splice(index,1);
  }

  update();
}

function openCart(){
  document.getElementById("cart").style.display="block";
}

function closeCart(){
  document.getElementById("cart").style.display="none";
}

function send(){

  let msg = "Hola, quiero estos servicios:%0A%0A";

  cart.forEach(i=>{
    msg += `- ${i.name} x${i.qty} = $${i.price*i.qty}%0A`;
  });

  let total = cart.reduce((a,b)=>a+b.price*b.qty,0);

  msg += `%0ATotal: $${total}`;

  window.open("https://wa.me/5493705141113?text="+msg,"_blank");
}

</script>

</body>
</html>
